<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Handora Master Account DMs</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&family=Sora:wght=400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#630ed4",
                        "surface-container-low": "#f2f3ff",
                        "surface-container": "#eaedff",
                        "on-surface": "#131b2e",
                        "on-surface-variant": "#4a4455"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#faf8ff] text-on-surface font-sans antialiased">
    <main class="max-w-[1280px] mx-auto h-screen flex flex-col md:flex-row p-4 md:p-6 gap-6">
        <section class="w-full md:w-[380px] bg-white rounded-3xl border border-surface-container/60 shadow-sm flex flex-col overflow-hidden">
            <div class="p-5 border-b border-surface-container/40 space-y-4">
                <div class="flex items-center justify-between">
                    <h1 class="font-headline-lg text-2xl font-bold tracking-tight">Direct Messages</h1>
                    <button class="w-10 h-10 rounded-full bg-surface-container/60 flex items-center justify-center text-primary hover:bg-primary/10 transition-colors">
                        <span class="material-symbols-outlined">edit_square</span>
                    </button>
                </div>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                    <input type="text" placeholder="Search chats, tags..." class="w-full pl-11 pr-4 py-2.5 rounded-2xl bg-surface-container-low border-none text-sm focus:ring-2 focus:ring-primary/20"/>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-3 space-y-1">
                <div class="flex items-center space-x-3 p-3.5 rounded-2xl bg-primary/5 border border-primary/10 cursor-pointer transition-all duration-200">
                    <div class="relative flex-shrink-0">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" class="w-12 h-12 rounded-full object-cover" alt="User avatar"/>
                        <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-white"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-0.5">
                            <h3 class="text-sm font-bold text-on-surface truncate">Chloe Vance</h3>
                            <span class="text-xs text-primary font-medium">Typing...</span>
                        </div>
                        <p class="text-xs text-primary font-medium truncate" id="typing-indicator">Chloe is typing an asset link...</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="flex-1 bg-white rounded-3xl border border-surface-container/60 shadow-sm flex flex-col overflow-hidden">
            <div class="p-4 border-b border-surface-container/40 flex items-center justify-between bg-white/80 backdrop-blur-md">
                <div class="flex items-center space-x-3">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" class="w-10 h-10 rounded-full object-cover" alt="Header Avatar"/>
                    <div>
                        <h2 class="text-sm font-bold text-on-surface">Chloe Vance</h2>
                        <span class="text-xs text-green-500 font-medium flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Active Now
                        </span>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-4 bg-gradient-to-b from-transparent to-surface-container-low/20">
                <div class="flex items-end space-x-2.5 max-w-[70%]">
                    <div class="bg-surface-container/60 text-on-surface p-3.5 rounded-2xl rounded-bl-none text-sm leading-relaxed">
                        Hey there! Can you send over the high-res campaign dashboard snapshots from yesterday?
                    </div>
                </div>
                <div class="flex items-end space-x-2.5 max-w-[70%] ml-auto justify-end">
                    <div class="bg-primary text-white p-3.5 rounded-2xl rounded-br-none text-sm leading-relaxed shadow-md shadow-primary/10">
                        Sure thing! Reconstructing them right now. Give me two minutes.
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-surface-container/40 bg-white">
                <div class="flex items-center space-x-3 bg-surface-container-low rounded-2xl p-2 pl-4">
                    <input type="text" placeholder="Type your message..." class="flex-1 bg-transparent border-none text-sm focus:ring-0 py-2"/>
                    <button class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
                        <span class="material-symbols-outlined text-[20px]">send</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const indicator = document.getElementById('typing-indicator');
        if (indicator) {
            setInterval(() => {
                indicator.style.opacity = indicator.style.opacity === '0' ? '1' : '0';
            }, 3000);
        }
    </script>
</body>
</html>
