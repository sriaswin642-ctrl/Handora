<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Handora | Discovery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
                    "primary": "#630ed4",
                    "surface-bright": "#faf8ff",
                    "surface-container-high": "#e2e7ff",
                    "on-surface": "#131b2e",
                    "on-surface-variant": "#4a4455"
            }
          }
        }
      }
    </script>
</head>
<body class="bg-[#faf8ff] text-on-surface font-sans antialiased min-h-screen">
    <div class="max-w-[1200px] mx-auto p-4 md:p-8 space-y-8 pb-24">
        <header class="space-y-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="font-headline-lg text-3xl font-extrabold tracking-tight">Explore Platform</h1>
                    <p class="text-sm text-on-surface-variant">Find creative assets, moments, and trends</p>
                </div>
            </div>
            <div class="flex items-center space-x-3 bg-white p-2 rounded-2xl border border-surface-container-high/60 shadow-sm">
                <span class="material-symbols-outlined pl-3 text-on-surface-variant">search</span>
                <input type="text" placeholder="Search trends, creators, or content templates..." class="flex-1 border-none bg-transparent focus:ring-0 text-sm py-2.5"/>
            </div>
        </header>

        <main class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div class="group relative aspect-square rounded-3xl overflow-hidden bg-surface-container-high cursor-pointer shadow-sm hover:shadow-lg transition-all duration-300">
                <img src="https://images.unsplash.com/photo-1511556532299-8f662fc26c06?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="Trend item"/>
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                    <div class="text-white">
                        <p class="text-xs font-semibold text-primary-fixed">#CreativeDesign</p>
                        <h4 class="text-sm font-bold mt-0.5">Abstract Visual Blocks</h4>
                    </div>
                </div>
            </div>
            <div class="group relative aspect-square rounded-3xl overflow-hidden bg-surface-container-high cursor-pointer shadow-sm hover:shadow-lg transition-all duration-300">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="Trend item"/>
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                    <div class="text-white">
                        <p class="text-xs font-semibold text-primary-fixed">#TechVibes</p>
                        <h4 class="text-sm font-bold mt-0.5">Next-gen Frameworks</h4>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
